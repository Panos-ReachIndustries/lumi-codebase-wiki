<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wiki — Lumi Codebase Wiki</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="app-header">
  <div class="logo"><span class="dot"></span>Lumi Codebase Wiki</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="graph.html">Graph</a>
    <a class="active" href="wiki.html">Wiki</a>
    <a href="chat.html">Chat</a>
  </nav>
  <div class="search-box">
    <input class="search" id="search" placeholder="Search the wiki + graph (⌘K)" autocomplete="off">
    <div class="search-results" id="search-results"></div>
  </div>
</header>

<div class="wiki-shell">
  <aside class="wiki-toc" id="toc">
    <div class="empty-state"><span class="spinner"></span></div>
  </aside>
  <main class="wiki-content">
    <article id="content">
      <div class="empty-state"><span class="spinner"></span></div>
    </article>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script src="assets/js/search.js"></script>
<script src="assets/js/wiki.js"></script>

</body>
</html>
